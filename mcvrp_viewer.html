        const selInstance = document.getElementById('sel-instance');
        const selSet = document.getElementById('sel-set');
        
        let currentSolIdx = 0;

        // Distinct colors for vehicles
        const VEHICLE_COLORS = [
            '#FF3366', '#00D2D3', '#FF9F43', '#5F27CD', '#FF6B6B', 
            '#10AC84', '#54A0FF', '#FECA57', '#F368E0', '#01A3A4',
            '#FF9FF3', '#00E640', '#FDCB6E', '#6C5CE7', '#E84393',
            '#00CEC9', '#74B9FF', '#FFEAA7', '#A29BFE', '#FD79A8'
        ];

        Object.keys(db).forEach(inst => {
            let opt = document.createElement('option');
            opt.value = inst;
            opt.innerHTML = inst;
            selInstance.appendChild(opt);
        });

        function updateSets() {
            const inst = selInstance.value;
            selSet.innerHTML = '';
            if(!db[inst]) return;
            
            db[inst].sets.forEach((set, i) => {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerHTML = set.name;
                selSet.appendChild(opt);
            });
            
            currentSolIdx = 0;
            drawPlots();
        }

        function drawPlots() {
            const inst = selInstance.value;
            const setIdx = selSet.value;
            if(!inst || !setIdx) return;

            const data = db[inst];
            const currentSet = data.sets[setIdx];
            const sols = currentSet.solutions;
            
            if (currentSolIdx >= sols.length) currentSolIdx = 0;
            
            drawMap(data, sols[currentSolIdx]);
            drawPareto(sols, currentSolIdx);
        }

        function drawMap(data, sol) {
            const coords = data.coords;
            const demands = data.demands;
            const routes = sol.routes;

            const traces = [];

            // Unassigned nodes
            const custX = [], custY = [], custText = [];
            for(let i=1; i<coords.length; i++) {
                custX.push(coords[i][0]);
                custY.push(coords[i][1]);
                custText.push(`Zastávka ${i}<br>Poptávka: ${demands[i]}`);
            }
            traces.push({
                x: custX, y: custY,
                mode: 'markers',
                marker: { size: 5, color: 'rgba(255,255,255,0.1)' },
                hoverinfo: 'text', hovertext: custText,
                showlegend: false
            });

            // Depot
            traces.push({
                x: [coords[0][0]], y: [coords[0][1]],
                mode: 'markers+text',
                text: ['Depot'], textposition: 'bottom center',
                marker: { symbol: 'square', size: 14, color: '#ff4444', line: {width:2, color:'#cc0000'} },
                hoverinfo: 'text', hovertext: ['<b>Depot</b>'],
                showlegend: false
            });

            // Routes
            routes.forEach((route, vi) => {
                const col = VEHICLE_COLORS[vi % VEHICLE_COLORS.length];
                const fullRoute = [0, ...route, 0];
                
                const rx = fullRoute.map(n => coords[n][0]);
                const ry = fullRoute.map(n => coords[n][1]);

                traces.push({
                    x: rx, y: ry,
                    mode: 'lines',
                    line: { width: 2.5, color: col },
                    hoverinfo: 'skip',
                    showlegend: false
                });

                const cx = route.map(n => coords[n][0]);
                const cy = route.map(n => coords[n][1]);
                const ct = route.map((n, idx) => `<b>Zastávka ${n}</b><br>Poptávka: ${demands[n]}<br>Vozidlo ${vi+1}<br>Pořadí: #${idx+1}`);
                
                traces.push({
                    x: cx, y: cy,
                    mode: 'markers',
                    marker: { size: 9, color: col, line: {width:1, color:'rgba(10,25,47,0.8)'} },
                    hoverinfo: 'text', hovertext: ct,
                    showlegend: false
                });
            });

            const info = sol.f1 !== null 
                ? `Vzdálenost (f0): ${sol.f0.toFixed(1)} | Nevyváženost (f1): ${sol.f1.toFixed(1)}`
                : `Vzdálenost: ${sol.f0}`;

            const layout = {
                title: { text: `Mapa tras - ${info}`, font: { color: '#ccd6f6', size: 14 } },
                hovermode: 'closest',
                xaxis: { showgrid: false, zeroline: false, visible: false },
                yaxis: { showgrid: false, zeroline: false, visible: false, scaleanchor: 'x' },
                margin: { l: 20, r: 20, t: 40, b: 20 },
                plot_bgcolor: 'transparent',
                paper_bgcolor: 'transparent'
            };

            Plotly.newPlot('map-container', traces, layout, {displayModeBar: false});
        }

        function drawPareto(sols, activeIdx) {
            const isBks = (sols[0].f1 === null);
            
            const f0s = sols.map(s => s.f0);
            const f1s = sols.map(s => isBks ? 0 : s.f1);
            
            const colors = sols.map((_, i) => i === activeIdx ? '#64ffda' : 'rgba(255,255,255,0.4)');
            const sizes = sols.map((_, i) => i === activeIdx ? 12 : 8);

            const trace = {
                x: f0s,
                y: f1s,
                mode: 'markers',
                type: 'scatter',
                marker: { size: sizes, color: colors, line: {width: 1, color: '#0a192f'} },
                hoverinfo: 'text',
                hovertext: sols.map(s => isBks ? `BKS Vzdálenost: ${s.f0}` : `f0: ${s.f0.toFixed(1)}<br>f1: ${s.f1.toFixed(1)}`)
            };

            const layout = {
                title: { text: isBks ? 'Best Known Solution' : 'Pareto Fronta (klikni na bod pro zobrazení trasy)', font: { color: '#ccd6f6', size: 14 } },
                xaxis: { title: 'Celková Vzdálenost (f0)', color: '#ffffff', gridcolor: 'rgba(136, 146, 176, 0.1)' },
                yaxis: { title: isBks ? '' : 'Nevyváženost (f1)', color: '#ffffff', gridcolor: 'rgba(136, 146, 176, 0.1)' },
                margin: { l: 50, r: 20, t: 40, b: 40 },
                plot_bgcolor: 'transparent',
                paper_bgcolor: 'transparent',
                hovermode: 'closest'
            };

            Plotly.newPlot('pareto-container', [trace], layout, {displayModeBar: false}).then(gd => {
                gd.on('plotly_click', function(data) {
                    const pointIdx = data.points[0].pointIndex;
                    currentSolIdx = pointIdx;
                    drawPlots();
                });
            });
        }

        selInstance.addEventListener('change', updateSets);
        selSet.addEventListener('change', () => { currentSolIdx = 0; drawPlots(); });

        updateSets();
    </script>
